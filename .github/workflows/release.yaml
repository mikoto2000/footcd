name: release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.0'
    - name: Build
      run: make cross
    - uses: ncipollo/release-action@v1
      with:
        artifacts: build/*
        allowUpdates: true
        draft: true
        omitBodyDuringUpdate: true


